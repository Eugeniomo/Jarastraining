<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Cursos 2026 | Jaras Training</title>
    <meta name="description" content="Calendario de fechas programadas para cursos de capacitación - Jaras Training">
    
    <style>
        :root {
            --primary-color: #10b981;
            --secondary-color: #3b82f6;
            --accent-color: #f59e0b;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gradient-primary: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .page-header {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1);
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .back-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }
        
        .back-link:hover { transform: translateX(-5px); }
        
        .page-header h1 {
            font-size: 2.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }
        
        .page-header p { color: var(--gray-600); font-size: 1.1rem; }
        
        .controls-section {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .control-group label {
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.9rem;
        }
        
        .control-group select {
            padding: 0.75rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .control-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .view-toggle {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .view-btn {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--gray-200);
            background: white;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .view-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .legend {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .legend-item { display: flex; align-items: center; gap: 0.5rem; }
        
        .legend-badge {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .badge-abierto { background: #d1fae5; color: #065f46; }
        .badge-planificado { background: #dbeafe; color: #1e40af; }
        .badge-finalizado { background: #e5e7eb; color: #374151; }
        
        .timeline { position: relative; }
        
        .month-section { margin-bottom: 3rem; }
        
        .month-header {
            background: var(--gradient-primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .event-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1);
            transition: all 0.4s ease;
            position: relative;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.15);
        }
        
        .event-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: var(--gradient-primary);
        }
        
        .event-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        .event-date {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 0.5rem;
        }
        
        .event-duration { color: var(--gray-600); font-size: 0.9rem; }
        
        .event-body { padding: 1.5rem; }
        
        .event-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }
        
        .event-code {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--gray-600);
            margin-bottom: 1rem;
        }
        
        .event-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--gray-700);
        }
        
        .detail-icon { color: var(--primary-color); }
        
        .event-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--gray-100);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .event-status {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-abierto { background: #d1fae5; color: #065f46; }
        .status-planificado { background: #dbeafe; color: #1e40af; }
        .status-finalizado { background: #e5e7eb; color: #374151; }
        
        .cupos-info { font-weight: 600; color: var(--gray-700); }
        .cupos-disponibles { color: var(--primary-color); }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 20px;
        }
        
        .empty-state h3 { font-size: 1.5rem; color: var(--gray-700); margin-bottom: 0.5rem; }
        .empty-state p { color: var(--gray-600); }
        
        .loading {
            text-align: center;
            padding: 4rem;
            font-size: 1.2rem;
            color: var(--gray-600);
        }

        /* WhatsApp Floating Button */
        .whatsapp-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            background: #25D366;
            color: white;
            border-radius: 50px;
            padding: 0.85rem 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover {
            background: #1ebe5d;
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(37, 211, 102, 0.55);
        }
        .whatsapp-float svg { width: 24px; height: 24px; flex-shrink: 0; }
        @media (max-width: 480px) {
            .whatsapp-float span { display: none; }
            .whatsapp-float { padding: 0.9rem; border-radius: 50%; }
        }
        
        @media (max-width: 768px) {
            .controls-grid { grid-template-columns: 1fr; }
            .events-grid { grid-template-columns: 1fr; }
            .legend { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-link">← Volver al Inicio</a>
            <h1>Calendario de Cursos 2026</h1>
            <p>Fechas programadas para capacitaciones</p>
        </div>
        
        <div class="controls-section">
            <div class="controls-grid">
                <div class="control-group">
                    <label for="cursoFilter">Filtrar por curso</label>
                    <select id="cursoFilter">
                        <option value="">Todos los cursos</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="estadoFilter">Filtrar por estado</label>
                    <select id="estadoFilter">
                        <option value="">Todos los estados</option>
                        <option value="Abierto">Abierto</option>
                        <option value="Planificado">Planificado</option>
                        <option value="Finalizado">Finalizado</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="periodoFilter">Período</label>
                    <select id="periodoFilter">
                        <option value="all">Todo el año</option>
                        <option value="Q1">Q1 (Ene-Mar)</option>
                        <option value="Q2">Q2 (Abr-Jun)</option>
                        <option value="Q3">Q3 (Jul-Sep)</option>
                        <option value="Q4">Q4 (Oct-Dic)</option>
                    </select>
                </div>
            </div>
            <div class="view-toggle">
                <button class="view-btn active" onclick="setView('month', this)">Vista Mensual</button>
                <button class="view-btn" onclick="setView('list', this)">Vista Lista</button>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item"><span class="legend-badge badge-abierto">Abierto para Inscripción</span></div>
            <div class="legend-item"><span class="legend-badge badge-planificado">Planificado</span></div>
            <div class="legend-item"><span class="legend-badge badge-finalizado">Finalizado</span></div>
        </div>
        
        <div id="calendarContainer" class="loading">Cargando calendario...</div>
    </div>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/56981319416?text=Hola%2C%20vengo%20del%20sitio%20web%20(calendario)" target="_blank" rel="noopener noreferrer" class="whatsapp-float" aria-label="Contactar por WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        <span>WhatsApp</span>
    </a>

    <script>
        let cursosData = [];
        let allEvents = [];
        let filteredEvents = [];
        let currentView = 'month';
        
        const mesesES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
        
        fetch('cursos-data.json')
            .then(response => response.json())
            .then(data => {
                cursosData = data.cursos;
                processEvents();
                populateCursoFilter();
                renderCalendar();
            })
            .catch(error => {
                console.error('Error cargando calendario:', error);
                document.getElementById('calendarContainer').innerHTML = `
                    <div class="empty-state">
                        <h3>Error al cargar calendario</h3>
                        <p>Por favor, intenta recargar la página</p>
                    </div>
                `;
            });
        
        function processEvents() {
            allEvents = [];
            cursosData.forEach(curso => {
                if (curso.fechasProgramadas && curso.fechasProgramadas.length > 0) {
                    curso.fechasProgramadas.forEach(fecha => {
                        allEvents.push({
                            curso: curso.nombre,
                            cursoCorto: curso.nombreCorto,
                            codigo: curso.codigo,
                            categoria: curso.categoria,
                            fechaInicio: new Date(fecha.fechaInicio + 'T00:00:00'),
                            fechaFin: new Date(fecha.fechaFin + 'T00:00:00'),
                            estado: fecha.estado,
                            cupos: fecha.cupos,
                            cuposDisponibles: fecha.cuposDisponibles,
                            ubicacion: fecha.ubicacion,
                            duracion: curso.duracion,
                            modalidad: curso.modalidad,
                            observaciones: fecha.observaciones || ''
                        });
                    });
                }
            });
            allEvents.sort((a, b) => a.fechaInicio - b.fechaInicio);
            filteredEvents = allEvents;
        }
        
        function populateCursoFilter() {
            const select = document.getElementById('cursoFilter');
            const uniqueCursos = [...new Set(cursosData.map(c => c.nombreCorto))];
            uniqueCursos.forEach(curso => {
                const option = document.createElement('option');
                option.value = curso;
                option.textContent = curso;
                select.appendChild(option);
            });
        }
        
        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            if (filteredEvents.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>No hay eventos programados</h3><p>Intenta ajustar los filtros</p></div>`;
                return;
            }
            container.innerHTML = '';
            container.className = 'timeline';
            if (currentView === 'month') {
                renderMonthView(container);
            } else {
                renderListView(container);
            }
        }
        
        function renderMonthView(container) {
            const eventsByMonth = {};
            filteredEvents.forEach(event => {
                const key = `${event.fechaInicio.getFullYear()}-${event.fechaInicio.getMonth()}`;
                if (!eventsByMonth[key]) {
                    eventsByMonth[key] = { month: event.fechaInicio.getMonth(), year: event.fechaInicio.getFullYear(), events: [] };
                }
                eventsByMonth[key].events.push(event);
            });
            Object.values(eventsByMonth).forEach(monthData => {
                const section = document.createElement('div');
                section.className = 'month-section';
                section.innerHTML = `
                    <div class="month-header">${mesesES[monthData.month]} ${monthData.year}</div>
                    <div class="events-grid">${monthData.events.map(event => createEventCard(event)).join('')}</div>
                `;
                container.appendChild(section);
            });
        }
        
        function renderListView(container) {
            const grid = document.createElement('div');
            grid.className = 'events-grid';
            grid.innerHTML = filteredEvents.map(event => createEventCard(event)).join('');
            container.appendChild(grid);
        }
        
        function createEventCard(event) {
            const fechaInicio = event.fechaInicio.toLocaleDateString('es-CL', { day: 'numeric', month: 'short' });
            const fechaFin = event.fechaFin.toLocaleDateString('es-CL', { day: 'numeric', month: 'short' });
            return `
                <div class="event-card">
                    <div class="event-header">
                        <div class="event-date">📅 ${fechaInicio} - ${fechaFin}</div>
                        <div class="event-duration">${event.duracion}</div>
                    </div>
                    <div class="event-body">
                        <h3 class="event-title">${event.cursoCorto}</h3>
                        <div class="event-code">${event.codigo}</div>
                        <div class="event-details">
                            <div class="detail-item"><span class="detail-icon">📍</span><span>${event.modalidad}</span></div>
                            <div class="detail-item"><span class="detail-icon">🏢</span><span>${event.ubicacion}</span></div>
                        </div>
                        ${event.observaciones ? `<p style="font-size:0.85rem;color:var(--gray-600);margin-top:0.5rem;">${event.observaciones}</p>` : ''}
                    </div>
                    <div class="event-footer">
                        <span class="event-status status-${event.estado.toLowerCase()}">${event.estado}</span>
                        <div class="cupos-info"><span class="cupos-disponibles">${event.cuposDisponibles}</span>/${event.cupos} cupos</div>
                    </div>
                </div>
            `;
        }
        
        function setView(view, btn) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCalendar();
        }
        
        document.getElementById('cursoFilter').addEventListener('change', applyFilters);
        document.getElementById('estadoFilter').addEventListener('change', applyFilters);
        document.getElementById('periodoFilter').addEventListener('change', applyFilters);
        
        function applyFilters() {
            const cursoFilter = document.getElementById('cursoFilter').value;
            const estadoFilter = document.getElementById('estadoFilter').value;
            const periodoFilter = document.getElementById('periodoFilter').value;
            filteredEvents = allEvents.filter(event => {
                const matchCurso = !cursoFilter || event.cursoCorto === cursoFilter;
                const matchEstado = !estadoFilter || event.estado === estadoFilter;
                let matchPeriodo = true;
                if (periodoFilter !== 'all') {
                    const month = event.fechaInicio.getMonth();
                    switch(periodoFilter) {
                        case 'Q1': matchPeriodo = month >= 0 && month <= 2; break;
                        case 'Q2': matchPeriodo = month >= 3 && month <= 5; break;
                        case 'Q3': matchPeriodo = month >= 6 && month <= 8; break;
                        case 'Q4': matchPeriodo = month >= 9 && month <= 11; break;
                    }
                }
                return matchCurso && matchEstado && matchPeriodo;
            });
            renderCalendar();
        }
    </script>
</body>
</html>
