    <style>
        :root {
            --primary-color: #10b981;
            --primary-dark: #059669;
            --secondary-color: #3b82f6;
            --accent-color: #f59e0b;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --gradient-primary: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .page-header {
            background: white;
            padding: 0.9rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1);
            margin-bottom: 1.25rem;
        }
        .back-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .back-link:hover { transform: translateX(-5px); }
        .page-header h1 {
            font-size: 1.7rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.15rem;
            font-weight: 800;
            line-height: 1.25;
        }
        .page-header .course-code {
            color: var(--gray-600);
            font-size: 0.9rem;
            font-family: monospace;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 1.5rem;
            align-items: start;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1);
            overflow: hidden;
        }
        .course-hero { position: relative; height: 240px; overflow: hidden; }
        .course-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .course-hero .badge-categoria-float {
            position: absolute; top: 1rem; left: 1rem;
            background: rgba(255,255,255,0.95); color: var(--gray-700);
            padding: 0.35rem 0.9rem; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .badge-estado {
            position: absolute; top: 1rem; right: 1rem;
            padding: 0.4rem 1rem; border-radius: 20px; color: white;
            font-size: 0.85rem; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .badge-abierto { background: #10b981; }
        .badge-planificado { background: #3b82f6; }
        .badge-finalizado { background: #6b7280; }
        .badge-cancelado { background: #dc2626; }
        .badge-completo { background: #f59e0b; }
        .clarke-banner { display: flex; gap: 16px; align-items: flex-start; background: linear-gradient(135deg, #fef2f2, #ffffff); border: 1px solid #fecaca; border-left: 4px solid #e11d2a; border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; }
        .clarke-banner .clarke-logo { width: 120px; flex-shrink: 0; margin-top: 2px; }
        .clarke-banner .clarke-text { font-size: 0.9rem; color: #374151; line-height: 1.5; }
        .clarke-banner .clarke-text strong { display: block; color: #e11d2a; font-size: 0.95rem; margin-bottom: 4px; }
        .clarke-banner .clarke-text b { color: #1f2937; }
        .clarke-banner .clarke-text a { display: inline-block; margin-top: 6px; color: #e11d2a; font-weight: 600; text-decoration: none; }
        .clarke-banner .clarke-text a:hover { text-decoration: underline; }
        @media (max-width: 520px) { .clarke-banner { flex-direction: column; } .clarke-banner .clarke-logo { width: 100px; } }

        .card-body { padding: 1.75rem 2rem; }
        .course-description { color: var(--gray-600); line-height: 1.7; margin-bottom: 1.5rem; font-size: 1rem; }

        .course-info {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem;
            margin-bottom: 1.75rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--gray-100);
        }
        .info-item { display: flex; align-items: center; gap: 0.6rem; font-size: 0.95rem; color: var(--gray-700); }
        .info-item .info-icon { font-size: 1.1rem; }
        .info-item small { display: block; color: var(--gray-600); font-size: 0.78rem; }

        .section-title {
            font-weight: 700; color: var(--gray-800); font-size: 1.15rem;
            margin-bottom: 0.9rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .content-list { list-style: none; margin-bottom: 1.75rem; }
        .content-list li {
            padding: 0.5rem 0; display: flex; gap: 0.6rem;
            color: var(--gray-700); font-size: 0.95rem; line-height: 1.5;
            border-bottom: 1px solid var(--gray-100);
        }
        .content-list li::before { content: '▸'; color: var(--primary-color); font-weight: 700; }

        .meta-block { margin-bottom: 1.5rem; }
        .meta-block .section-title { font-size: 1rem; margin-bottom: 0.5rem; }
        .meta-block p { color: var(--gray-600); font-size: 0.95rem; line-height: 1.6; }

        .fechas-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .fecha-item {
            background: var(--gray-100); border-radius: 12px; padding: 0.85rem 1.1rem;
            font-size: 0.92rem; color: var(--gray-700);
        }
        .fecha-item strong { color: var(--gray-800); }
        .fecha-item .obs { display: block; margin-top: 0.25rem; color: var(--gray-600); font-size: 0.85rem; }

        /* --- Formulario (columna derecha, sticky) --- */
        .form-card { position: sticky; top: 2rem; }
        .form-card .form-head { background: var(--gradient-primary); color: white; padding: 1.25rem 1.5rem; }
        .form-card .form-head h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.25rem; }
        .form-card .form-head p { font-size: 0.85rem; opacity: 0.95; }
        .form-body { padding: 1.5rem; }
        .price-row {
            display: flex; align-items: baseline; justify-content: space-between;
            margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--gray-100);
        }
        .price-row .label { color: var(--gray-600); font-size: 0.9rem; }
        .price-row .price { font-size: 1.5rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .price-row .price.consultar { font-size: 1.05rem; font-weight: 600; background: none; -webkit-text-fill-color: initial; color: var(--gray-700); }

        .form-group { margin-bottom: 0.9rem; }
        .form-group label { display: block; font-weight: 600; color: var(--gray-700); font-size: 0.85rem; margin-bottom: 0.35rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 0.6rem 0.75rem; border: 2px solid var(--gray-200);
            border-radius: 10px; font-size: 0.95rem; font-family: inherit; transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .btn-submit {
            width: 100%; padding: 0.85rem 1.5rem; background: var(--gradient-primary);
            color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
        .form-message {
            margin-top: 0.9rem; padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.9rem;
            display: none;
        }
        .form-message.show { display: block; }
        .form-message.success { background: #d1fae5; color: #065f46; }
        .form-message.error { background: #fee2e2; color: #991b1b; }
        .form-hint { font-size: 0.78rem; color: var(--gray-600); text-align: center; margin-top: 0.75rem; }

        /* WhatsApp Floating Button */
        .whatsapp-float {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
            background: #25D366; color: white; border-radius: 50px; padding: 0.85rem 1.4rem;
            display: flex; align-items: center; gap: 0.6rem; text-decoration: none;
            font-weight: 600; font-size: 0.95rem; box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover { background: #1ebe5d; transform: translateY(-3px); box-shadow: 0 8px 28px rgba(37, 211, 102, 0.55); }
        .whatsapp-float svg { width: 24px; height: 24px; flex-shrink: 0; }

        .loading { text-align: center; padding: 4rem; font-size: 1.2rem; color: var(--gray-600); }
        .empty-state { text-align: center; padding: 4rem 2rem; background: white; border-radius: 20px; }
        .empty-state h3 { font-size: 1.5rem; color: var(--gray-700); margin-bottom: 0.5rem; }
        .empty-state p { color: var(--gray-600); margin-bottom: 1rem; }
        .empty-state a { color: var(--primary-color); font-weight: 600; text-decoration: none; }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .form-card { position: static; }
        }
        @media (max-width: 480px) {
            .whatsapp-float span { display: none; }
            .whatsapp-float { padding: 0.9rem; border-radius: 50%; }
            .course-info { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        <div id="cursoRoot" class="loading">Cargando curso…</div>
    </div>

    <a id="waFloat" href="https://wa.me/56981319416?text=Hola%2C%20vengo%20del%20sitio%20web" target="_blank" rel="noopener noreferrer" class="whatsapp-float" aria-label="Contactar por WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

    <script>
        const IMAGEN_DEFAULT = 'capacitacion-practica.jpg';
        const IMAGEN_POR_CATEGORIA = {
            'Salas de Bomba': 'sala-bombas-general.jpg',
            'Estándares Internacionales': 'capacitacion-practica.jpg',
            'Brigadas de Emergencia': 'capacitacion-practica.jpg',
            'Corporativo': 'sala-jaras.png',
        };
        const SUBMIT_COOLDOWN = 30000;
        let lastSubmit = 0;
        let cursoActual = null;

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        function fmtFecha(iso) {
            if (!iso) return '';
            const p = String(iso).split('-');
            return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : iso;
        }
        function getSlug() {
            const q = new URLSearchParams(window.location.search);
            return q.get('slug') || q.get('curso') || q.get('id') || '';
        }

        fetch('cursos-data.json')
            .then(r => r.json())
            .then(data => {
                const slug = getSlug();
                const cursos = data.cursos || [];
                // Match por id (canónico); fallback por nombreCorto para links viejos
                const curso = cursos.find(c => c.id === slug)
                           || cursos.find(c => (c.nombreCorto || '') === slug);
                if (!curso) { renderNotFound(); return; }
                cursoActual = curso;
                renderCurso(curso);
            })
            .catch(() => renderError());

        function renderNotFound() {
            document.getElementById('cursoRoot').className = '';
            document.getElementById('cursoRoot').innerHTML = `
                <div class="empty-state">
                    <h3>Curso no encontrado</h3>
                    <p>El curso que buscas no existe o cambió de dirección.</p>
                    <a href="cursos.html">← Ver todos los cursos</a>
                </div>`;
        }
        function renderError() {
            document.getElementById('cursoRoot').className = '';
            document.getElementById('cursoRoot').innerHTML = `
                <div class="empty-state">
                    <h3>No se pudo cargar el curso</h3>
                    <p>Puede haber un problema de conexión.</p>
                    <button onclick="location.reload()" style="padding:0.75rem 1.5rem;background:var(--gradient-primary);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Reintentar</button>
                </div>`;
        }

        function renderCurso(c) {
            document.title = `${c.nombreCorto || c.nombre} | Jaras Training`;
            const imagen = c.imagen || IMAGEN_POR_CATEGORIA[c.categoria] || IMAGEN_DEFAULT;

            // SEO / preview del link (canónica, descripción y Open Graph)
            const canonical = c.url || ('https://jarastraining.cl/curso.html?slug=' + (c.id || ''));
            const desc = (c.descripcion || '').slice(0, 180);
            const setAttr = (id, attr, val) => { const el = document.getElementById(id); if (el) el.setAttribute(attr, val); };
            setAttr('metaDesc', 'content', desc);
            setAttr('metaCanonical', 'href', canonical);
            setAttr('ogTitle', 'content', `${c.nombreCorto || c.nombre} | Jaras Training`);
            setAttr('ogDesc', 'content', desc);
            setAttr('ogImage', 'content', new URL(imagen, location.href).href);
            let estado = 'Planificado';
            if (c.fechasProgramadas && c.fechasProgramadas.length > 0 && c.fechasProgramadas[0].estado) {
                estado = c.fechasProgramadas[0].estado;
            }
            const esMonto = /\d/.test(c.precio || '');

            // Temario
            const contenido = (c.contenido || []).map(x => `<li>${esc(x)}</li>`).join('');

            // Fechas
            let fechasHtml = '';
            const fechas = (c.fechasProgramadas || []).filter(f => f && (f.fechaInicio || f.estado || f.ubicacion));
            if (fechas.length) {
                fechasHtml = `<div class="meta-block"><h3 class="section-title">📅 Fechas programadas</h3><div class="fechas-list">` +
                    fechas.map(f => {
                        let linea = '';
                        if (f.fechaInicio) {
                            linea = `<strong>${fmtFecha(f.fechaInicio)}${f.fechaFin ? ' al ' + fmtFecha(f.fechaFin) : ''}</strong>`;
                        } else {
                            linea = `<strong>${esc(f.estado || 'Por confirmar')}</strong>`;
                        }
                        const lugar = f.ubicacion ? ` · ${esc(f.ubicacion)}` : '';
                        const cupos = (f.cuposDisponibles != null) ? ` · ${f.cuposDisponibles} cupos` : '';
                        const obs = f.observaciones ? `<span class="obs">${esc(f.observaciones)}</span>` : '';
                        return `<div class="fecha-item">${linea}${lugar}${cupos}${obs}</div>`;
                    }).join('') +
                    `</div></div>`;
            } else {
                fechasHtml = `<div class="meta-block"><h3 class="section-title">📅 Fechas</h3><p>Fechas por confirmar — consulta disponibilidad con el formulario.</p></div>`;
            }

            const requisitosHtml = c.requisitos ? `
                <div class="meta-block">
                    <h3 class="section-title">✅ Requisitos</h3>
                    <p>${esc(c.requisitos)}</p>
                </div>` : '';

            // Respaldo Clarke Fire (solo cursos con c.clarke)
            const clarkeHtml = c.clarke ? `
                <div class="clarke-banner">
                    <img src="clarke-logo.png" alt="Clarke Fire" class="clarke-logo" loading="lazy">
                    <div class="clarke-text">
                        <strong>Certificado por Clarke Fire</strong>
                        Jaras Diesel Training es <b>Centro de Capacitación Certificado de Clarke Fire para Latinoamérica</b> y Máster Service Dealer oficial. Este curso cuenta con el respaldo y la validación de Clarke Fire.
                        <a href="Carta%20jaras%20clarke%20Chile.pdf" target="_blank" rel="noopener">Ver certificado oficial →</a>
                    </div>
                </div>` : '';

            const waText = encodeURIComponent(`Hola, me interesa el curso ${c.nombreCorto || c.nombre}. ¿Me pueden dar más información?`);
            const waLink = `https://wa.me/56981319416?text=${waText}`;

            document.getElementById('cursoRoot').className = '';
            document.getElementById('cursoRoot').innerHTML = `
                <div class="page-header">
                    <a href="cursos.html" class="back-link">← Volver al Catálogo</a>
                    <h1>${esc(c.nombre)}</h1>
                    <div class="course-code">Código: ${esc(c.codigo || '')}</div>
                </div>

                <div class="layout">
                    <!-- Columna contenido -->
                    <div class="card">
                        <div class="course-hero">
                            <img src="${esc(imagen)}" alt="${esc(c.nombreCorto || c.nombre)}">
                            <span class="badge-categoria-float">${esc(c.categoria || '')}</span>
                            <span class="badge-estado badge-${estado.toLowerCase()}">${esc(estado)}</span>
                        </div>
                        <div class="card-body">
                            ${clarkeHtml}
                            <p class="course-description">${esc(c.descripcion || '')}</p>

                            <div class="course-info">
                                <div class="info-item"><span class="info-icon">⏱️</span><span>${esc(c.duracion || '')}<small>Duración</small></span></div>
                                <div class="info-item"><span class="info-icon">📍</span><span>${esc(c.modalidad || '')}<small>Modalidad</small></span></div>
                                <div class="info-item"><span class="info-icon">👥</span><span>${esc(c.dirigidoA || '')}<small>Dirigido a</small></span></div>
                                <div class="info-item"><span class="info-icon">📜</span><span>${esc(c.certificacion || '')}<small>Certificación</small></span></div>
                            </div>

                            <h3 class="section-title">📋 Contenido del curso</h3>
                            <ul class="content-list">${contenido}</ul>

                            ${requisitosHtml}
                            ${fechasHtml}
                        </div>
                    </div>

                    <!-- Columna formulario -->
                    <div class="card form-card">
                        <div class="form-head">
                            <h2>Consultar / Inscribirse</h2>
                            <p>Te contactamos con toda la información</p>
                        </div>
                        <div class="form-body">
                            <div class="price-row">
                                <span class="label">Valor</span>
                                <span class="price${esMonto ? '' : ' consultar'}">${esc(c.precio || 'Consultar')}</span>
                            </div>
                            <form id="cursoForm">
                                <div class="form-group">
                                    <label for="nombre">Nombre completo *</label>
                                    <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
                                </div>
                                <div class="form-group">
                                    <label for="empresa">Empresa</label>
                                    <input type="text" id="empresa" name="empresa" placeholder="Nombre de tu empresa">
                                </div>
                                <div class="form-group">
                                    <label for="email">Email *</label>
                                    <input type="email" id="email" name="email" required placeholder="correo@empresa.com">
                                </div>
                                <div class="form-group">
                                    <label for="telefono">Teléfono / WhatsApp</label>
                                    <input type="tel" id="telefono" name="telefono" placeholder="+56 9 XXXX XXXX">
                                </div>
                                <div class="form-group">
                                    <label for="mensaje">Mensaje</label>
                                    <textarea id="mensaje" name="mensaje" placeholder="¿Cuántas personas? ¿Fecha preferida?"></textarea>
                                </div>
                                <button type="submit" class="btn-submit">Enviar consulta</button>
                                <div id="formMessage" class="form-message"></div>
                                <p class="form-hint">o escríbenos por <a href="${waLink}" target="_blank" rel="noopener" style="color:#059669;font-weight:600;">WhatsApp</a></p>
                            </form>
                        </div>
                    </div>
                </div>`;

            // WhatsApp flotante con contexto del curso
            const wf = document.getElementById('waFloat');
            if (wf) wf.href = waLink;

            document.getElementById('cursoForm').addEventListener('submit', enviarConsulta);
        }

        function showMessage(text, type) {
            const msg = document.getElementById('formMessage');
            msg.textContent = text;
            msg.className = 'form-message ' + type + ' show';
            setTimeout(() => msg.classList.remove('show'), 6000);
        }

        function enviarConsulta(e) {
            e.preventDefault();
            const now = Date.now();
            if (now - lastSubmit < SUBMIT_COOLDOWN) { showMessage('Espera unos segundos entre envíos.', 'error'); return; }
            const form = e.target;
            const required = form.querySelectorAll('[required]');
            let ok = true;
            required.forEach(f => { if (!f.value.trim()) { ok = false; f.style.borderColor = '#dc2626'; } else { f.style.borderColor = '#10b981'; } });
            if (!ok) { showMessage('Completa los campos obligatorios.', 'error'); return; }

            const btn = form.querySelector('button[type="submit"]');
            const original = btn.textContent;
            btn.textContent = 'Enviando…'; btn.disabled = true;

            const fd = Object.fromEntries(new FormData(form));
            const c = cursoActual || {};
            const payload = {
                nombre: fd.nombre || '',
                email: fd.email || '',
                telefono: fd.telefono || '',
                empresa: fd.empresa || '',
                notas: fd.mensaje || '',
                origen: 'curso-' + (c.id || 'web'),
                curso_interes: c.nombreCorto || c.nombre || '',
            };

            fetch('https://crm.sercloud.cl/api/formulario.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            })
                .then(r => r.json().catch(() => ({})).then(j => ({ ok: r.ok && j.ok !== false })))
                .then(res => {
                    if (res.ok) {
                        lastSubmit = Date.now();
                        if (typeof gtag === 'function') { try { gtag('event', 'generate_lead', { curso: payload.curso_interes }); } catch (_) {} }
                        showMessage('¡Consulta enviada! Te contactamos pronto.', 'success');
                        form.reset();
                    } else {
                        showMessage('Error al enviar. Intenta de nuevo o escríbenos por WhatsApp.', 'error');
                    }
                    btn.textContent = original; btn.disabled = false;
                })
                .catch(() => {
                    showMessage('Error al enviar. Intenta de nuevo o escríbenos por WhatsApp.', 'error');
                    btn.textContent = original; btn.disabled = false;
                });
        }
    </script>
</body>
</html>
